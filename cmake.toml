[project]
name = "DebugLoopRace"
version = "0.1.0"

[target.TitanEngine]
type = "interface"
include-directories = ["TitanEngine"]
x64.link-libraries = ["TitanEngine/TitanEngine_x64.lib"]
x32.link-libraries = ["TitanEngine/TitanEngine_x86.lib"]

[target.DebugLoop]
type = "executable"
sources = ["src/DebugLoop/*.cpp"]
include-directories = ["include"]
link-options = ["/INCREMENTAL:NO"]

[target.DebugLoop.properties]
VS_DEBUGGER_COMMAND_ARGUMENTS = "\"$<TARGET_FILE:DebugMe>\""

[template.test]
type = "executable"
link-options = ["/DYNAMICBASE:NO", "/INCREMENTAL:NO"]

[target.DebugMe]
type = "test"
sources = ["src/DebugMe/*.cpp"]

[target.MemoryTest]
type = "test"
sources = ["src/MemoryTest/*.cpp"]

[target.AntiDebugHandle]
type = "test"
sources = ["src/AntiDebugHandle/*.cpp"]

[target.TestTitanEngine]
type = "executable"
sources = ["src/TestTitanEngine/*.cpp", "src/TestTitanEngine/*.h"]
link-libraries = ["::TitanEngine"]

[target.TestTitanEngine.properties]
VS_DEBUGGER_COMMAND_ARGUMENTS = "\"$<TARGET_FILE:DebugMe>\""

[target.TestDeletionRace]
type = "executable"
sources = ["src/TestDeletionRace/*.cpp"]
link-libraries = ["::TitanEngine"]

[target.TestDeletionRace.properties]
VS_DEBUGGER_COMMAND_ARGUMENTS = "\"$<TARGET_FILE:DebugMe>\""

# Debuggee for the multi-thread breakpoint/step race test. /OPT:NOICF keeps the
# RaceFunction / ControlFunction / Control2Function bodies from being folded together.
[target.StepRaceMe]
type = "executable"
sources = ["src/StepRaceMe/*.cpp"]
link-options = ["/OPT:NOICF", "/INCREMENTAL:NO"]

# Driver: exercises per-thread breakpoint/step state across software, hardware and
# memory breakpoints (see TestStepRace.cpp for the mode list). Pass the mode as a second
# argument; the CI workflow runs each mode and fails on a non-zero exit or a hang.
[target.TestStepRace]
type = "executable"
sources = ["src/TestStepRace/*.cpp"]
link-libraries = ["::TitanEngine"]

[target.TestStepRace.properties]
VS_DEBUGGER_COMMAND_ARGUMENTS = "\"$<TARGET_FILE:StepRaceMe>\""
